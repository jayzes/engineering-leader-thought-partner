      - title: The Engineering Executive's Primer
        year: 2024
      - title: Staff Engineer
        subtitle: Leadership Beyond the Management Track
        year: 2021
      - title: An Elegant Puzzle
        subtitle: Systems of Engineering Management
        year: 2019
    frameworks_adapted:
      - Staff Archetypes
      - Engineering Strategy (Diagnosis → Policies → Actions)
      - Crafting Engineering Strategy (comprehensive strategy framework)
      - Trunk and Branches
      - First 90 Days
      - Systems Thinking for Organizations
      - AI Adoption for Engineering Leaders

  - name: Jack Danger
    type: thought-leader
    websites:
      - url: https://jackdanger.com/technical-coherence/
        description: Technical Coherence framework
    frameworks_adapted:
      - Technical Coherence (UX Domains, Shared Domains, Three Layers)

  - name: Simon Wardley
    type: thought-leader
    websites:
      - url: https://learnwardleymapping.com/
        description: Wardley Mapping community, tutorials, and classes
      - url: https://twitter.com/swardley
        description: Running commentary, map examples, strategic analysis
    books:
      - title: Wardley Maps
        subtitle: Topographical Intelligence in Business
        year: 2018
        license: Creative Commons BY-SA 4.0
    frameworks_adapted:
      - Wardley Mapping (Anchor, Position, Movement, Components)
      - Evolution axis (Genesis → Custom Built → Product → Commodity)
