# Sources and Attribution
#
# This thought partner synthesizes ideas from the following sources.
# All frameworks and content are adapted and summarized for practical application.

sources:
  - name: Will Larson
    type: thought-leader
    websites:
      - url: https://lethain.com/
        description: Engineering leadership blog
      - url: https://staffeng.com/
        description: Staff engineer guides and interviews
      - url: https://infraeng.dev/
        description: Infrastructure engineering organization
    books:
      - title: Crafting Engineering Strategy
