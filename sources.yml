        description: Engineering leadership blog
      - url: https://staffeng.com/
        description: Staff engineer guides and interviews
      - url: https://infraeng.dev/
        description: Infrastructure engineering organization
    books:
      - title: Crafting Engineering Strategy
        year: 2025
      - title: The Engineering Executive's Primer
        year: 2024
      - title: Staff Engineer
        subtitle: Leadership Beyond the Management Track
        year: 2021
      - title: An Elegant Puzzle
        subtitle: Systems of Engineering Management
        year: 2019
    frameworks_adapted:
      - Staff Archetypes
      - Engineering Strategy (Diagnosis → Policies → Actions)
      - Crafting Engineering Strategy (comprehensive strategy framework)
      - Trunk and Branches
      - First 90 Days
      - Systems Thinking for Organizations
      - AI Adoption for Engineering Leaders

  - name: Jack Danger
    type: thought-leader
    websites:
      - url: https://jackdanger.com/technical-coherence/
        description: Technical Coherence framework
    frameworks_adapted:
      - Technical Coherence (UX Domains, Shared Domains, Three Layers)

  - name: Simon Wardley
    type: thought-leader
    websites:
      - url: https://learnwardleymapping.com/
        description: Wardley Mapping community, tutorials, and classes
      - url: https://twitter.com/swardley
        description: Running commentary, map examples, strategic analysis
    books:
      - title: Wardley Maps
        subtitle: Topographical Intelligence in Business
        year: 2018
        license: Creative Commons BY-SA 4.0
    frameworks_adapted:
      - Wardley Mapping (Anchor, Position, Movement, Components)
      - Evolution axis (Genesis → Custom Built → Product → Commodity)
      - Doctrine (Universal Principles)
      - Climatic Patterns (Red Queen, Inertia, Co-evolution, Higher-order systems)
      - Stratagems and Gameplays (Open source, FUD, Patents, ILC)
      - Pioneers, Settlers, Town Planners (PST)

  - name: Ryan Singer
    type: thought-leader
    websites:
      - url: https://basecamp.com/shapeup
        description: Shape Up — full book, free online
      - url: https://felttime.com
        description: Singer's current site — writing, coaching, podcast (post-Basecamp)
    books:
      - title: Shape Up
        subtitle: Stop Running in Circles and Ship Work that Matters
        year: 2019
        publisher: 37signals / Basecamp
    frameworks_adapted:
      - Shape Up (Shaping → Betting → Building)
      - Appetite vs. Estimate
      - The Pitch (rough, solved, bounded, de-risked)
      - Bets, Not Backlogs
      - The Circuit Breaker (fixed time, variable scope)
      - Hill Chart (uphill / downhill, uncertainty tracking)
      - Scopes (organic decomposition)
      - Breadboarding and Fat Marker Sketches
      - The Betting Table
      - Six-week cycles + two-week cooldowns

  - name: Andy Grove
    type: thought-leader
    biography: Co-founder, third employee, former CEO and Chairman of Intel (1968–2005). Chemical engineer; co-invented the MOS semiconductor process. Mentor to a generation of Silicon Valley operators. Introduced OKRs at Intel; John Doerr later brought them to Google.
    books:
      - title: High Output Management
        year: 1983
        publisher: Random House / Vintage (reissued 1995)
        note: Foundational text on managing knowledge-work organizations
      - title: Only the Paranoid Survive
        subtitle: How to Exploit the Crisis Points That Challenge Every Company
        year: 1996
        publisher: Crown Business
      - title: Swimming Across
        subtitle: A Memoir
        year: 2001
    frameworks_adapted:
      - Managerial Output Equation (manager's output = team output + influenced-team output)
      - Managerial Leverage (high / low / negative leverage activity)
      - Task-Relevant Maturity (TRM) — structured / coaching / delegating
      - Paired Indicators (single metrics are always gameable)
      - OKRs — Objectives and Key Results (ambitious, quarterly, public, decoupled from comp)
      - The 1:1 (subordinate's meeting, 60–90 minutes, TRM-calibrated cadence)
      - Meetings as a Medium (process-oriented vs. mission-oriented)
      - Strategic Inflection Points and the 10X Force (six competitive forces including Grove's complementors)
      - Let Chaos Reign, Then Rein In Chaos (two-phase SIP navigation)
      - The Valley of Death and the Two-Curve Transition
      - The Self-Exile Test ("if the board brought in a new CEO, what would they do?")
      - Peacetime vs. Wartime Leadership (via Horowitz, extending Grove)
      - Free Discussion, Clear Decision, Full Support
      - Hybrid Organizations (mission + functional with dual reporting)
      - Training as Highest-Leverage Activity
      - The Production Principle (limiting step, lead indicators, quality control, variable capacity)

  - name: Richard Rumelt
    type: reference
    books:
      - title: Good Strategy Bad Strategy
        year: 2011
    note: Strategy framework (Diagnosis, Guiding Policies, Coherent Actions) adapted via Will Larson

  - name: Donella Meadows
    type: reference
    books:
      - title: Thinking in Systems
        year: 2008
    note: Systems thinking concepts adapted for organizational context

